name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        # mlx is Apple-Silicon-only and is intentionally omitted on Linux runners;
        # the modules that use it import lazily, so those paths skip in CI.
        run: uv sync --extra test --extra api --extra json-repair

      - name: Run tests
        run: uv run python -m pytest
